<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: #ffffff;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 28px; font-weight: 600; margin: 0; color: #1c1c1e; }
        .sub-text { font-size: 15px; color: #aeaeb2; margin-top: -10px; margin-bottom: 5px; }

        .input-field {
            width: 100%; background: #f2f2f7; border: 1.5px solid #007aff;
            border-radius: 18px; padding: 16px; font-family: 'Courier New', monospace;
            font-size: 20px; text-align: center; outline: none; box-sizing: border-box;
            color: #aeaeb2; letter-spacing: 1px;
        }

        .code-container {
            background: #f8f9fb; border-radius: 30px; padding: 25px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .label-tiny {
            font-size: 11px; font-weight: 700; color: #aeaeb2;
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
        }

        #currentCode {
            font-size: 44px; font-weight: 800; color: #007aff;
            letter-spacing: 5px; margin-bottom: 20px;
            filter: blur(14px); transition: filter 0.4s ease;
        }

        .btn-primary {
            width: 100%; background: #007aff; color: white; border: none;
            border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
        }

        .footer-info { display: flex; justify-content: space-between; align-items: center; padding: 5px; margin-top: 10px;}
        .next-up-box { text-align: left; opacity: 0; transition: opacity 0.4s; }
        .next-up-box.show { opacity: 1; }
        
        .next-up-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #nextCode { font-size: 16px; font-weight: 600; color: #8e8e93; }
        
        .material-symbols-outlined { font-size: 18px; vertical-align: middle; transition: transform 0.2s; }

        .timer-container { min-width: 90px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #d1d1d6; height: 6px; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #progressBar { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }

        .revealed { filter: blur(0) !important; }

        #toast {
            position: fixed; top: 30px; background: rgba(0,0,0,0.8);
            color: white; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="toast">Copied</div>

<div class="card">
    <h2>Authenticator</h2>
    <div class="sub-text">Secure Link Protocol</div>

    <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key">

    <div class="code-container">
        <span class="label-tiny">Current Code</span>
        <div id="currentCode">------</div>
        <button class="btn-primary" id="actionBtn" onclick="revealUI()">Show</button>
    </div>

    <div class="footer-info">
        <div class="next-up-box" id="nextSec">
            <span class="label-tiny">Next Up</span>
            <div class="next-up-row" onclick="copyValue('nextCode')">
                <span id="nextCode">------</span>
                <span class="material-symbols-outlined" id="nextIcon" style="color: #007aff; opacity: 0.6;">content_copy</span>
            </div>
        </div>
        <div class="timer-container">
            <span id="timerText">30s</span>
            <div class="progress-bg"><div id="progressBar"></div></div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const actionBtn = document.getElementById('actionBtn');
    const nextSec = document.getElementById('nextSec');

    // Auto-grab from URL
    const path = window.location.pathname.split('/').filter(p => p).pop();
    if (path && path.length > 4) { secretInput.value = path.toUpperCase(); }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 1500);
    }

    // HTTP-friendly copy
    function execCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
    }

    function revealUI() {
        const secret = secretInput.value.trim().replace(/\s/g, '');
        if (!secret) return;
        
        currentDisplay.classList.add('revealed');
        nextSec.classList.add('show');
        
        // Initial Reveal Copy
        execCopy(currentDisplay.innerText);
        showToast("Code Copied");

        // Change button to Animated "Copy Code"
        actionBtn.innerText = "✓ Copied";
        actionBtn.style.background = "#34c759";
        
        setTimeout(() => {
            actionBtn.innerText = "Copy Code";
            actionBtn.style.background = "#007aff";
        }, 1500);

        // Update button behavior for future clicks
        actionBtn.onclick = () => {
            const val = currentDisplay.innerText;
            if(val.includes('-')) return;
            execCopy(val);
            
            actionBtn.innerText = "✓ Copied";
            actionBtn.style.background = "#34c759";
            setTimeout(() => {
                actionBtn.innerText = "Copy Code";
                actionBtn.style.background = "#007aff";
            }, 1500);
        };
        
        updateTOTP();
    }

    function copyValue(id) {
        const val = document.getElementById(id).innerText;
        if(val.includes('-')) return;
        execCopy(val);
        showToast("Copied");

        const icon = document.getElementById('nextIcon');
        icon.style.transform = "scale(1.4)";
        setTimeout(() => icon.style.transform = "scale(1)", 200);
    }

    function updateTOTP() {
        let raw = secretInput.value.replace(/[^A-Z2-7]/gi, '').toUpperCase();
        if (!raw || !currentDisplay.classList.contains('revealed')) return;

        try {
            const totp = new OTPAuth.TOTP({
                secret: OTPAuth.Secret.fromBase32(raw),
                digits: 6,
                period: 30
            });

            const now = Date.now();
            const timeLeft = 30 - (Math.floor(now / 1000) % 30);
            
            currentDisplay.innerText = totp.generate();
            nextDisplay.innerText = totp.generate({ timestamp: now + 30000 });
            
            timerText.innerText = timeLeft + "s";
            progressBar.style.width = (timeLeft / 30 * 100) + "%";
            
            const color = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            progressBar.style.backgroundColor = color; 
            timerText.style.color = color;
        } catch (e) {
            currentDisplay.innerText = "INVALID";
        }
    }

    setInterval(updateTOTP, 1000);
</script>
</body>
</html>
