<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: #ffffff;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 28px; font-weight: 600; margin: 0; color: #1c1c1e; }
        .sub-text { font-size: 15px; color: #aeaeb2; margin-top: -10px; margin-bottom: 5px; }

        .input-field {
            width: 100%; background: #f2f2f7; border: 1.5px solid #007aff;
            border-radius: 18px; padding: 18px; font-family: 'Courier New', monospace;
            font-size: 22px; text-align: center; outline: none; box-sizing: border-box;
            color: #aeaeb2; letter-spacing: 1px;
        }

        .code-container {
            background: #f8f9fb; border-radius: 30px; padding: 30px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .label-upper {
            font-size: 13px; font-weight: 600; color: #aeaeb2;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }

        #currentCode {
            font-size: 60px; font-weight: 700; color: #007aff;
            letter-spacing: 2px; margin-bottom: 20px;
            filter: blur(14px); transition: filter 0.4s ease;
        }

        .btn-main {
            width: 100%; background: #007aff; color: white; border: none;
            border-radius: 20px; padding: 18px; font-size: 18px; font-weight: 600;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2);
        }

        .footer {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5px; margin-top: 10px;
        }

        .next-section { text-align: left; opacity: 0; }
        .next-section.show { opacity: 1; }
        
        .next-title { font-size: 11px; font-weight: 600; color: #aeaeb2; text-transform: uppercase; margin-bottom: 4px;}
        .next-val-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #nextCode { font-size: 18px; font-weight: 500; color: #8e8e93; }

        .timer-section { text-align: right; min-width: 100px; position: relative; }
        #timerText { font-size: 13px; font-weight: 600; color: #007aff; margin-bottom: 4px; display: block; }
        .bar-bg { background: #e5e5ea; height: 6px; border-radius: 10px; overflow: hidden; width: 100%; }
        #barFill { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }

        .revealed { filter: blur(0) !important; }

        .material-symbols-outlined { vertical-align: middle; font-size: 20px; }

        #toast {
            position: fixed; top: 30px; background: rgba(0,0,0,0.8);
            color: white; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="toast">Copied</div>

<div class="card">
    <h2>Authenticator</h2>
    <div class="sub-text">Secure Link Protocol</div>

    <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key">

    <div class="code-container">
        <span class="label-upper">Current Code</span>
        <div id="currentCode">000000</div>
        <button class="btn-main" id="showBtn" onclick="revealUI()">Show</button>
    </div>

    <div class="footer">
        <div class="next-section" id="nextSec">
            <div class="next-title">Next Up</div>
            <div class="next-val-row" onclick="copyValue('nextCode')">
                <span id="nextCode">000000</span>
                <span class="material-symbols-outlined" style="color: #007aff; opacity: 0.5;">content_copy</span>
            </div>
        </div>

        <div class="timer-section">
            <span id="timerText">30s</span>
            <div class="bar-bg"><div id="barFill"></div></div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentCode = document.getElementById('currentCode');
    const nextCode = document.getElementById('nextCode');
    const showBtn = document.getElementById('showBtn');
    const nextSec = document.getElementById('nextSec');
    const barFill = document.getElementById('barFill');
    const timerText = document.getElementById('timerText');

    // Auto-grab secret from URL
    const path = window.location.pathname.split('/').filter(p => p).pop();
    if (path && path.length > 4) {
        secretInput.value = path.toUpperCase();
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 1500);
    }

    function revealUI() {
        const secret = secretInput.value.trim().replace(/\s/g, '');
        if (!secret) return;
        
        currentCode.classList.add('revealed');
        nextSec.classList.add('show');
        showBtn.innerText = "Copy Code";
        
        // Fix for Copy Button
        showBtn.onclick = () => {
            navigator.clipboard.writeText(currentCode.innerText);
            showToast("Code Copied");
        };
        
        updateLogic();
        navigator.clipboard.writeText(currentCode.innerText);
        showToast("Code Copied");
    }

    function copyValue(id) {
        const val = document.getElementById(id).innerText;
        navigator.clipboard.writeText(val);
        showToast("Copied");
    }

    function updateLogic() {
        const secret = secretInput.value.trim().replace(/\s/g, '');
        if (!secret || !currentCode.classList.contains('revealed')) return;

        try {
            const totp = new OTPAuth.TOTP({
                secret: OTPAuth.Secret.fromBase32(secret),
                digits: 6,
                period: 30
            });

            const now = Date.now();
            const timeLeft = 30 - (Math.floor(now / 1000) % 30);
            
            currentCode.innerText = totp.generate();
            nextCode.innerText = totp.generate({ timestamp: now + 30000 });
            
            timerText.innerText = timeLeft + "s";
            barFill.style.width = (timeLeft / 30 * 100) + "%";
            
            const themeColor = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            barFill.style.backgroundColor = themeColor;
            timerText.style.color = themeColor;
        } catch (e) {
            currentCode.innerText = "ERROR";
        }
    }

    setInterval(updateLogic, 1000);
</script>
</body>
</html>
