<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f2f2f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: #ffffff;
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }

        h2 { font-size: 28px; font-weight: 600; margin: 0; color: #1c1c1e; }
        .sub-text { font-size: 15px; color: #aeaeb2; margin-top: -10px; margin-bottom: 5px; }

        .input-field {
            width: 100%; background: #f2f2f7; border: 1.5px solid #007aff;
            border-radius: 18px; padding: 16px; font-family: 'Courier New', monospace;
            font-size: 20px; text-align: center; outline: none; box-sizing: border-box;
            color: #000000; /* Deep black text */
            font-weight: 600;
            letter-spacing: 1px;
        }

        .code-container {
            background: #f8f9fb; border-radius: 30px; padding: 25px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .label-tiny {
            font-size: 11px; font-weight: 700; color: #aeaeb2;
            text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 12px;
        }

        #currentCode {
            font-size: 44px; font-weight: 800; color: #007aff;
            letter-spacing: 5px; margin-bottom: 20px;
            filter: blur(14px); transition: filter 0.4s ease;
        }

        .btn-primary {
            width: 100%; background: #007aff; color: white; border: none;
            border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
        }

        .footer-info { display: flex; justify-content: space-between; align-items: center; padding: 5px; margin-top: 10px;}
        .next-up-box { text-align: left; opacity: 0; transition: opacity 0.4s; }
        .next-up-box.show { opacity: 1; }
        
        .next-up-row { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        #nextCode { font-size: 16px; font-weight: 600; color: #1c1c1e; }
        
        .material-symbols-outlined { font-size: 18px; vertical-align: middle; transition: transform 0.2s; }

        .timer-container { min-width: 90px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #d1d1d6; height: 6px; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #progressBar { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }

        .revealed { filter: blur(0) !important; }

        #toast {
            position: fixed; top: 30px; background: rgba(0,0,0,0.8);
            color: white; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div id="toast">Copied</div>

<div class="card">
    <h2>Authenticator</h2>
    <div class="sub-text">Secure Link Protocol</div>

    <input type="text" id="secretInput" class="input-field" placeholder="Enter Secret Key">

    <div class="code-container">
        <span class="label-tiny">Current Code</span>
        <div id="currentCode">------</div>
        <button class="btn-primary" id="actionBtn" onclick="revealUI()">Show</button>
    </div>
