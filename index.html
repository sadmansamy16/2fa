<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Authenticator</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://cdn.jsdelivr.net/npm/otpauth@9.1.2/dist/otpauth.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #f2f2f7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; }
        .card { background: #ffffff; border-radius: 40px; padding: 35px 25px; text-align: center; width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .share-link-btn { position: absolute; top: 25px; right: 25px; background: #f2f2f7; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8e8e93; transition: all 0.2s ease; }
        h2 { font-size: 26px; font-weight: 700; margin: 0; color: #1c1c1e; padding-right: 30px; }
        .sub-text { font-size: 14px; color: #8e8e93; margin-top: -5px; }
        .action-row { display: flex; gap: 10px; margin-top: 5px; }
        .btn-secondary { flex: 1; background: #f2f2f7; border: 1px solid #d1d1d6; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; color: #1c1c1e; cursor: pointer; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; display: none; margin-bottom: 10px; }
        .input-field { width: 100%; background: #f2f2f7; border: 1.5px solid #007aff; border-radius: 18px; padding: 16px; font-family: 'Courier New', monospace; font-size: 18px; text-align: center; outline: none; box-sizing: border-box; color: #1c1c1e; }
        .code-container { background: #f8f9fb; border-radius: 30px; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
        .label-tiny { font-size: 11px; font-weight: 700; color: #aeaeb2; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
        #currentCode { font-size: 44px; font-weight: 800; color: #007aff; letter-spacing: 5px; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
        .btn-primary { width: 100%; background: #007aff; color: white; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .footer-info { display: flex; justify-content: space-between; align-items: flex-end; padding: 5px; }
        
        /* NEXT UP SECTION ANIMATIONS */
        .next-up-row { 
            display: flex; align-items: center; gap: 8px; cursor: pointer; 
            transition: transform 0.2s ease, opacity 0.2s ease;
            padding: 4px 8px; border-radius: 8px; margin-left: -8px;
        }
        .next-up-row:active { transform: scale(0.95); opacity: 0.7; }
        #nextCode { font-size: 16px; font-weight: 600; color: #8e8e93; transition: color 0.3s ease; }
        #nextCopyIcon { font-size: 16px; color: #007aff; transition: all 0.3s ease; }

        .timer-container { min-width: 80px; text-align: right; }
        #timerText { font-size: 12px; font-weight: 700; color: #007aff; }
        .progress-bg { background: #d1d1d6; height: 6px; border-radius: 10px; margin-top: 6px; overflow: hidden; }
        #progressBar { background: #007aff; height: 100%; width: 100%; transition: width 1s linear; }
        #toast { position: fixed; top: 30px; background: rgba(0,0,0,0.85); color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    </style>
</head>
<body>

<div id="toast">Copied</div>

<div class="card">
    <button class="share-link-btn" onclick="copyGeneratedUrl()" title="Share Link">
        <span class="material-symbols-outlined" id="urlIcon">link</span>
    </button>
    <h2>Authenticator</h2>
    <div class="sub-text">Secure TOTP</div>
    <div class="action-row">
        <button class="btn-secondary" id="startCamBtn" onclick="startCamera()">
            <span class="material-symbols-outlined">Camera</span> Camera
        </button>
        <button class="btn-secondary" id="stopCamBtn" onclick="stopCamera()" style="display:none; color:#ff3b30;">
            <span class="material-symbols-outlined">close</span> Close
        </button>
        <label class="btn-secondary">
            <span class="material-symbols-outlined">File</span> File
            <input type="file" accept="image/*" id="qr-input" onchange="scanFile(this)" style="display: none;">
        </label>
    </div>
    <div id="reader"></div>
    <input type="text" id="secretInput" class="input-field" placeholder="Secret Key" spellcheck="false">
    <div class="code-container">
        <span class="label-tiny">Current Code</span>
        <div id="currentCode">------</div>
        <button class="btn-primary" id="copyBtn" onclick="copyValue('currentCode')">Copy Code</button>
    </div>
    <div class="footer-info">
        <div class="next-up-box">
            <span class="label-tiny">Next Up</span>
            <div class="next-up-row" onclick="copyValue('nextCode')">
                <span id="nextCode">------</span>
                <span class="material-symbols-outlined" id="nextCopyIcon">content_copy</span>
            </div>
        </div>
        <div class="timer-container">
            <span id="timerText">30s</span>
            <div class="progress-bg"><div id="progressBar"></div></div>
        </div>
    </div>
</div>

<script>
    const secretInput = document.getElementById('secretInput');
    const currentDisplay = document.getElementById('currentCode');
    const nextDisplay = document.getElementById('nextCode');
    const timerText = document.getElementById('timerText');
    const progressBar = document.getElementById('progressBar');
    const copyBtn = document.getElementById('copyBtn');
    const nextCopyIcon = document.getElementById('nextCopyIcon');
    const html5QrCode = new Html5Qrcode("reader");

    function parseHash() {
        const rawPath = window.location.pathname;
        const pathSegments = rawPath.split('/').filter(p => p);
        const hash = window.location.hash.substring(1);
        if (pathSegments.length > 0) { window.location.replace("/"); return; }
        if (hash && hash.length > 3) {
            secretInput.value = decodeURIComponent(hash).toUpperCase().replace(/\s/g, '');
            updateTOTP();
            window.history.replaceState(null, null, window.location.pathname);
        } else {
            currentDisplay.innerText = "------";
            nextDisplay.innerText = "------";
            secretInput.value = "";
        }
    }

    window.addEventListener('hashchange', parseHash);
    parseHash();

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 1500);
    }

    async function safeCopy(text) {
        try { await navigator.clipboard.writeText(text); } 
        catch (err) {
            const textArea = document.createElement("textarea");
            textArea.value = text; document.body.appendChild(textArea);
            textArea.select(); document.execCommand('copy');
            document.body.removeChild(textArea);
        }
    }

    function copyGeneratedUrl() {
        const secret = secretInput.value.trim();
        if (!secret) { showToast("Enter a secret first"); return; }
        const finalUrl = "https://samy.pro.bd/2fa/#" + secret;
        safeCopy(finalUrl);
        showToast("Privacy-Safe Link Copied");
        const icon = document.getElementById('urlIcon');
        icon.innerText = "check";
        setTimeout(() => icon.innerText = "link", 1500);
    }

    async function startCamera() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('startCamBtn').style.display = 'none';
        document.getElementById('stopCamBtn').style.display = 'flex';
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => { processInput(text); stopCamera(); });
        } catch (err) { alert("Camera error."); stopCamera(); }
    }

    function stopCamera() {
        const resetUI = () => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('startCamBtn').style.display = 'flex';
            document.getElementById('stopCamBtn').style.display = 'none';
        };
        if (html5QrCode.isScanning) { html5QrCode.stop().then(resetUI); } else { resetUI(); }
    }

    function scanFile(input) {
        if (input.files[0]) {
            html5QrCode.scanFile(input.files[0], true).then(text => processInput(text)).catch(() => alert("No QR code found."));
        }
    }

    function processInput(data) {
        let secret = data;
        if (data.includes('secret=')) {
            try { const url = new URL(data); secret = url.searchParams.get("secret"); } 
            catch(e) { secret = data.split('secret=')[1]?.split('&')[0] || data; }
        }
        secretInput.value = secret.toUpperCase().replace(/\s/g, '');
        updateTOTP();
    }

    function updateTOTP() {
        let raw = secretInput.value.replace(/\s/g, '');
        if (!raw) { currentDisplay.innerText = "------"; nextDisplay.innerText = "------"; return; }
        try {
            const secretObj = raw.length < 8 ? OTPAuth.Secret.fromUTF8(raw) : OTPAuth.Secret.fromBase32(raw.replace(/[^A-Z2-7]/gi, '').toUpperCase());
            const totp = new OTPAuth.TOTP({ secret: secretObj, digits: 6, period: 30 });
            const now = Date.now();
            const timeLeft = 30 - (Math.floor(now / 1000) % 30);
            currentDisplay.innerText = totp.generate();
            nextDisplay.innerText = totp.generate({ timestamp: now + 30000 });
            timerText.innerText = timeLeft + "s";
            progressBar.style.width = (timeLeft / 30 * 100) + "%";
            const color = timeLeft <= 5 ? "#ff3b30" : "#007aff";
            progressBar.style.backgroundColor = color; 
            timerText.style.color = color;
        } catch (e) { currentDisplay.innerText = "INVALID"; }
    }

    async function copyValue(id) {
        const val = document.getElementById(id).innerText;
        if (val.includes('-') || val === "INVALID") return;
        await safeCopy(val);
        showToast("Code Copied");

        if (id === 'currentCode') {
            copyBtn.innerText = "✓ Copied"; copyBtn.style.background = "#34c759";
            setTimeout(() => { copyBtn.innerText = "Copy Code"; copyBtn.style.background = "#007aff"; }, 1000);
        } else if (id === 'nextCode') {
            // NEXT UP ANIMATION
            nextDisplay.style.color = "#34c759";
            nextCopyIcon.innerText = "check_circle";
            nextCopyIcon.style.color = "#34c759";
            nextCopyIcon.style.transform = "scale(1.2)";
            
            setTimeout(() => {
                nextDisplay.style.color = "#8e8e93";
                nextCopyIcon.innerText = "content_copy";
                nextCopyIcon.style.color = "#007aff";
                nextCopyIcon.style.transform = "scale(1)";
            }, 1000);
        }
    }

    secretInput.addEventListener('input', updateTOTP);
    setInterval(updateTOTP, 1000);
    updateTOTP();
</script>
</body>
</html>
